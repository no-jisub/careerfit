name: Deploy Firebase Hosting

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: firebase-hosting-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Build and verify Firebase flows
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 22
          cache: npm

      - name: Set up Java 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Verify Firebase authentication, access, and document flows
        run: npx firebase-tools emulators:exec --project careerfit-local --only auth,firestore "npm run firebase:seed && npm run firebase:verify"

  deploy:
    name: Build and deploy live site
    needs: verify
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    env:
      VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID }}
      VITE_FIREBASE_MEASUREMENT_ID: ${{ vars.VITE_FIREBASE_MEASUREMENT_ID }}
      VITE_USE_FIREBASE_EMULATORS: "false"
      VITE_FIREBASE_AUTH_ENABLED: "false"
      VITE_FIRESTORE_SYNC_ENABLED: "false"
      VITE_DEMO_MODE_ENABLED: "false"

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 22
          cache: npm

      - name: Validate Firebase build configuration
        shell: bash
        run: |
          required_variables=(
            VITE_FIREBASE_API_KEY
            VITE_FIREBASE_AUTH_DOMAIN
            VITE_FIREBASE_PROJECT_ID
            VITE_FIREBASE_STORAGE_BUCKET
            VITE_FIREBASE_MESSAGING_SENDER_ID
            VITE_FIREBASE_APP_ID
          )

          for variable_name in "${required_variables[@]}"; do
            if [[ -z "${!variable_name}" ]]; then
              echo "::error::Missing GitHub repository variable: ${variable_name}"
              exit 1
            fi
          done

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          project_id: careerfit-aiboost-a601a
          workload_identity_provider: projects/540520328208/locations/global/workloadIdentityPools/github-actions/providers/careerfit-main
          service_account: github-actions-hosting@careerfit-aiboost-a601a.iam.gserviceaccount.com

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools deploy --only hosting --project careerfit-aiboost-a601a --non-interactive
